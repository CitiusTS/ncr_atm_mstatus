<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCR ATM — M-Status Checker</title>
<style>
  /* ── Reset & Base ───────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:    #1F3864;
    --blue:    #2E75B6;
    --lblue:   #D5E8F0;
    --llblue:  #EEF4FB;
    --teal:    #006064;
    --lteal:   #E0F7FA;
    --red:     #C00000;
    --lred:    #FFE8E8;
    --orange:  #C55A11;
    --lorange: #FFF0E0;
    --yellow:  #FFF9C4;
    --green:   #2E7D32;
    --lgreen:  #E8F5E9;
    --gray:    #595959;
    --lgray:   #F5F7FA;
    --white:   #FFFFFF;
    --border:  #D0D8E4;
    --text:    #1A1A2E;
    --radius:  10px;
    --shadow:  0 2px 12px rgba(31,56,100,0.10);
    --shadow-lg: 0 8px 32px rgba(31,56,100,0.18);
  }
  html { font-size: 15px; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--lgray);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────── */
  .app-header {
    background: linear-gradient(135deg, var(--navy) 0%, #2E4A8A 60%, var(--blue) 100%);
    padding: 20px 28px 0;
    box-shadow: var(--shadow-lg);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 16px;
  }
  .header-icon {
    width: 48px; height: 48px; flex-shrink: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .header-title h1 {
    font-size: 1.35rem; font-weight: 700; color: #fff;
    letter-spacing: 0.3px;
  }
  .header-title p {
    font-size: 0.78rem; color: rgba(255,255,255,0.65);
    margin-top: 2px; font-style: italic;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.85);
    font-size: 0.70rem; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 0.5px; white-space: nowrap;
  }

  /* ── Search Bar ─────────────────────────────────────── */
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: var(--radius);
    padding: 8px 14px;
    margin-bottom: 16px;
  }
  .search-bar svg { flex-shrink: 0; opacity: 0.6; }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none;
    color: #fff; font-size: 0.95rem;
    font-family: inherit;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.45); }
  .search-clear {
    cursor: pointer; opacity: 0.5; font-size: 18px; color: #fff;
    line-height: 1; background: none; border: none;
    transition: opacity .2s;
  }
  .search-clear:hover { opacity: 1; }

  /* ── Tabs ───────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 4px;
  }
  .tab-btn {
    padding: 10px 22px; font-size: 0.88rem; font-weight: 600;
    border: none; cursor: pointer; border-radius: 8px 8px 0 0;
    background: rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.65);
    transition: all .2s; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn.active {
    background: var(--lgray);
    color: var(--navy);
  }
  .tab-btn:not(.active):hover {
    background: rgba(255,255,255,0.18);
    color: #fff;
  }
  .tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* ── Main content ───────────────────────────────────── */
  .app-body { padding: 24px 28px; max-width: 1300px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Stats bar ──────────────────────────────────────── */
  .stats-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-size: 0.80rem; font-weight: 600; color: var(--gray);
    box-shadow: var(--shadow);
  }
  .stat-dot {
    width: 9px; height: 9px; border-radius: 50%;
  }
  .stat-count { font-weight: 700; }

  /* ── Filter chips ───────────────────────────────────── */
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 20px; align-items: center;
  }
  .filter-label {
    font-size: 0.78rem; font-weight: 600; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .chip {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid transparent; cursor: pointer;
    font-size: 0.80rem; font-weight: 600;
    background: var(--white); color: var(--gray);
    border-color: var(--border);
    transition: all .18s;
  }
  .chip.active, .chip:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.10); }
  .chip-all.active   { background: var(--navy); color: #fff; border-color: var(--navy); }
  .chip-kritis.active { background: var(--red); color: #fff; border-color: var(--red); }
  .chip-tinggi.active  { background: var(--orange); color: #fff; border-color: var(--orange); }
  .chip-menengah.active { background: #856404; color: #fff; border-color: #856404; }
  .chip-normal.active  { background: var(--green); color: #fff; border-color: var(--green); }

  /* ── Cards grid ─────────────────────────────────────── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border-left: 5px solid var(--border);
    overflow: hidden;
    transition: transform .18s, box-shadow .18s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .card.kritis  { border-left-color: var(--red); }
  .card.tinggi  { border-left-color: var(--orange); }
  .card.menengah { border-left-color: #D4AC0D; }
  .card.normal, .card.info { border-left-color: var(--green); }

  .card-header {
    display: flex; align-items: flex-start;
    padding: 14px 16px 10px;
    gap: 12px;
  }
  .card-code {
    background: var(--navy); color: #fff;
    font-size: 1.25rem; font-weight: 800;
    min-width: 52px; text-align: center;
    border-radius: 8px; padding: 6px 10px;
    letter-spacing: 1px; font-family: 'Courier New', monospace;
    flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-title {
    font-size: 0.92rem; font-weight: 700; color: var(--text);
    line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
    border-radius: 12px; letter-spacing: 0.4px;
    text-transform: uppercase; white-space: nowrap;
  }
  .badge-kritis  { background: var(--lred);    color: var(--red); }
  .badge-tinggi  { background: var(--lorange); color: var(--orange); }
  .badge-menengah{ background: var(--yellow);  color: #856404; }
  .badge-normal,
  .badge-info    { background: var(--lgreen);  color: var(--green); }
  .badge-tipe    { background: var(--llblue);  color: var(--blue); }

  .card-divider {
    height: 1px; background: var(--border);
    margin: 0 16px;
  }
  .card-body { padding: 12px 16px 14px; }
  .card-section { margin-bottom: 8px; }
  .card-section:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 0.68rem; font-weight: 700; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 3px;
    display: flex; align-items: center; gap: 5px;
  }
  .section-label svg { opacity: 0.6; }
  .section-text {
    font-size: 0.84rem; color: var(--text); line-height: 1.5;
  }
  .card-actions {
    padding: 0 16px 14px;
    display: flex; gap: 8px;
  }
  .btn-detail {
    flex: 1; padding: 7px 0; border-radius: 7px;
    border: 1.5px solid var(--blue); background: none;
    color: var(--blue); font-size: 0.80rem; font-weight: 700;
    cursor: pointer; transition: all .18s; font-family: inherit;
  }
  .btn-detail:hover { background: var(--blue); color: #fff; }

  /* ── Empty state ────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--gray);
  }
  .empty-state .es-icon { font-size: 52px; opacity: 0.35; margin-bottom: 12px; }
  .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: var(--navy); }
  .empty-state p { font-size: 0.88rem; opacity: 0.7; }

  /* ── Modal ──────────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,20,50,0.55); z-index: 999;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 14px;
    box-shadow: var(--shadow-lg);
    max-width: 700px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: modalIn .22s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    from { transform: scale(.94) translateY(16px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex; align-items: flex-start;
    padding: 22px 22px 16px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-code {
    background: var(--navy); color: #fff;
    font-size: 2rem; font-weight: 800;
    min-width: 68px; text-align: center;
    border-radius: 10px; padding: 10px 14px;
    letter-spacing: 1px; font-family: 'Courier New', monospace;
    flex-shrink: 0;
  }
  .modal-title { flex: 1; }
  .modal-title h2 { font-size: 1.15rem; font-weight: 700; color: var(--navy); line-height: 1.4; }
  .modal-title .modal-badges { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
  .modal-close {
    background: var(--lgray); border: none; border-radius: 8px;
    width: 34px; height: 34px; cursor: pointer; font-size: 18px;
    color: var(--gray); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s;
  }
  .modal-close:hover { background: var(--lred); color: var(--red); }
  .modal-body { padding: 20px 22px 24px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section-title {
    font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--blue);
    border-bottom: 2px solid var(--lblue);
    padding-bottom: 5px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 7px;
  }
  .modal-section-text {
    font-size: 0.90rem; line-height: 1.65; color: var(--text);
  }
  .solusi-list { list-style: none; }
  .solusi-list li {
    display: flex; gap: 10px; padding: 6px 0;
    border-bottom: 1px solid var(--lgray);
    font-size: 0.88rem; line-height: 1.5;
  }
  .solusi-list li:last-child { border-bottom: none; }
  .solusi-num {
    flex-shrink: 0; width: 22px; height: 22px;
    background: var(--blue); color: #fff;
    border-radius: 50%; font-size: 0.70rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .komponen-tag {
    display: inline-block;
    background: var(--llblue); color: var(--blue);
    font-size: 0.78rem; font-weight: 600; padding: 3px 10px;
    border-radius: 5px; margin: 3px 3px 3px 0;
    border: 1px solid var(--lblue);
  }
  .prio-banner {
    border-radius: 8px; padding: 10px 14px;
    margin-bottom: 14px; font-size: 0.86rem; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .prio-banner.kritis  { background: var(--lred);    color: var(--red); }
  .prio-banner.tinggi  { background: var(--lorange); color: var(--orange); }
  .prio-banner.menengah { background: var(--yellow); color: #856404; }
  .prio-banner.normal,
  .prio-banner.info    { background: var(--lgreen);  color: var(--green); }

  /* ── Result count ───────────────────────────────────── */
  .result-count {
    font-size: 0.80rem; color: var(--gray);
    margin-bottom: 14px; font-weight: 600;
  }
  .result-count span { color: var(--navy); font-size: 1rem; }

  /* ── Scrollbar ──────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C8D4E8; border-radius: 4px; }

  /* ── Responsive ─────────────────────────────────────── */
  @media (max-width: 600px) {
    .app-body { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .header-badge { display: none; }
    .tab-btn { padding: 9px 14px; font-size: 0.80rem; }
  }

  /* ── Print ──────────────────────────────────────────── */
  @media print {
    .app-header, .filter-row, .card-actions { display: none !important; }
    .cards-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <div class="header-icon">🏧</div>
    <div class="header-title">
      <h1>NCR ATM — M-Status Checker</h1>
      <p>Referensi Error Code Offline · Currency Dispenser & Card Reader</p>
    </div>
    <div class="header-badge">APTRA 2.06 / NDC+ by Laska</div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Cari kode M-Status, deskripsi, atau solusi..." autocomplete="off">
    <button class="search-clear" id="clearSearch" title="Hapus pencarian">✕</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="dispenser">
      <span class="tab-dot" style="background:#FFB347"></span>
      💵 Currency Dispenser
    </button>
    <button class="tab-btn" data-tab="cardreader">
      <span class="tab-dot" style="background:#64B5F6"></span>
      💳 Card Reader (IMCRW/UIMCRW)
    </button>
  </div>
</header>

<!-- BODY -->
<main class="app-body">

  <!-- ══ TAB: DISPENSER ══════════════════════════════════ -->
  <div class="tab-panel active" id="tab-dispenser">
    <div class="stats-bar" id="stats-dispenser"></div>
    <div class="filter-row" id="filter-dispenser"></div>
    <div class="result-count" id="count-dispenser"></div>
    <div class="cards-grid" id="grid-dispenser"></div>
  </div>

  <!-- ══ TAB: CARD READER ════════════════════════════════ -->
  <div class="tab-panel" id="tab-cardreader">
    <div class="stats-bar" id="stats-cardreader"></div>
    <div class="filter-row" id="filter-cardreader"></div>
    <div class="result-count" id="count-cardreader"></div>
    <div class="cards-grid" id="grid-cardreader"></div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-code" id="mCode"></div>
      <div class="modal-title">
        <h2 id="mTitle"></h2>
        <div class="modal-badges" id="mBadges"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA – CURRENCY DISPENSER
// ═══════════════════════════════════════════════════════════
const DISPENSER_DATA = [
  { code:"00", prio:"Normal", tipe:"Semua",
    desc:"Tidak ada error – operasi berjalan normal",
    komponen:[],
    solusi:["Tidak diperlukan tindakan. Sistem normal."] },

  { code:"01", prio:"Tinggi", tipe:"Semua",
    desc:"Pick diminta dari kaset yang tidak terpasang, atau tidak ada kaset terpasang saat self-test",
    komponen:["Kaset","Pick Module"],
    solusi:["Periksa dan pastikan kaset uang terpasang dengan benar di semua posisi pick module (atas, ke-2, ke-3, bawah).","Lakukan self-test ulang setelah kaset dipasang kembali."] },

  { code:"02", prio:"Tinggi", tipe:"Semua",
    desc:"Terlalu banyak lembaran uang yang ditolak (reject): terlalu kecil, terlalu besar, ganda, ekstra, atau gagal mempelajari lebar dan singularitas lembaran",
    komponen:["Sensor LVDT/NTS","Kaset","Mekanisme Pick"],
    solusi:["Bersihkan sensor LVDT/NTS dengan kain bebas serat yang dibasahi IPA.","Periksa kondisi uang dalam kaset (tidak kusut, basah, atau menempel).","Lakukan prosedur 'Learn Bill Parameters'.","Jika berlanjut, ganti kaset atau bersihkan mekanisme pick."] },

  { code:"03", prio:"Tinggi", tipe:"Semua",
    desc:"Kegagalan pengambilan lembaran (pick failure)",
    komponen:["Mekanisme Pick","Kaset","Sensor Pick"],
    solusi:["Periksa apakah kaset terisi cukup uang.","Bersihkan roller dan sensor pick dengan blower udara bertekanan rendah.","Pastikan uang dalam kaset tidak saling menempel.","Jika berlanjut, periksa atau ganti pick module."] },

  { code:"04", prio:"Kritis", tipe:"Semua",
    desc:"Pick failure + sensor low aktif – kaset hampir kosong atau kosong",
    komponen:["Mekanisme Pick","Kaset (Hampir Kosong)","Sensor Low Kaset"],
    solusi:["ISI ULANG kaset uang segera.","Setelah pengisian, lakukan reset unit.","Jalankan self-test untuk konfirmasi.","Jika error masih muncul meski kaset penuh, periksa sensor low cassette."] },

  { code:"05", prio:"Kritis", tipe:"Semua",
    desc:"Kegagalan sensor transport utama, uang macet di transport, ATAU dispense singkat (jumlah lembar kurang dari permintaan) tanpa laporan error",
    komponen:["Sensor Transport (TSEN 1-8)","Jalur Transport Utama","Timing Disk Motor Utama"],
    solusi:["Buka unit dan periksa adanya uang yang macet di jalur transport utama.","Bersihkan semua sensor transport (TSEN 1-8) dengan udara bertekanan rendah.","Periksa kondisi timing disk motor utama (retak, kotor).","Verifikasi jumlah dispense apakah sesuai permintaan host."] },

  { code:"06", prio:"Tinggi", tipe:"Spray",
    desc:"Kesalahan divert gate: posisi awal salah, gagal bergerak ke posisi yang benar, atau kegagalan sensor divert gate",
    komponen:["Divert Gate","Sensor Divert Gate","Solenoid Divert Gate"],
    solusi:["Periksa mekanisme divert gate secara visual (kemungkinan macet atau terhalang benda asing).","Bersihkan sensor divert gate.","Uji fungsi solenoid divert gate.","Jika perlu, ganti unit divert gate."] },

  { code:"07", prio:"Kritis", tipe:"Semua",
    desc:"Purge bin / reject bin TIDAK terpasang – unit tidak beroperasi (INOPERATIVE)",
    komponen:["Purge Bin / Reject Bin"],
    solusi:["Pasang purge bin dengan benar hingga terdengar bunyi klik (terkunci).","Lakukan reset unit setelah pemasangan.","Unit tidak dapat beroperasi sama sekali tanpa purge bin terpasang."] },

  { code:"08", prio:"Kritis", tipe:"Stacking",
    desc:"Sensor overfill purge bin terblokir ATAU purge bin sudah penuh – unit tidak beroperasi",
    komponen:["Purge Bin","Sensor Overfill Purge Bin"],
    solusi:["Kosongkan purge bin dari semua lembaran uang yang tertolak.","Bersihkan sensor overfill purge bin dari kotoran.","Pastikan sensor tidak rusak secara fisik.","Lakukan reset unit setelah purge bin dikosongkan."] },

  { code:"09", prio:"Kritis", tipe:"Semua",
    desc:"Kegagalan komunikasi antara firmware Command dan Execution, atau antara host dan perangkat (USB S1). Informasi replenishment mungkin tidak tersedia",
    komponen:["Board Kontrol","Kabel Komunikasi","Firmware"],
    solusi:["Periksa koneksi kabel antara command board dan execution board.","Lakukan power cycle (matikan dan hidupkan kembali ATM).","Update atau reflash firmware jika diperlukan.","Jika berlanjut, ganti board kontrol."] },

  { code:"10", prio:"Kritis", tipe:"Semua",
    desc:"Operasi tidak dilakukan karena perangkat atau kaset dalam status FATAL dari operasi sebelumnya. Reset SOH ke HEALTHY diperlukan",
    komponen:["SOH (State of Health)","Board Kontrol"],
    solusi:["Lakukan reset SOH ke status HEALTHY melalui Supervisor Software ATM.","Identifikasi penyebab FATAL dari log error sebelumnya.","Selesaikan masalah akar (root cause) sebelum melanjutkan operasi.","Setelah SOH HEALTHY, jalankan self-test."] },

  { code:"11", prio:"Tinggi", tipe:"Semua",

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let activeTab = 'dispenser';
let searchQuery = '';
let activeFilters = { dispenser: 'semua', cardreader: 'semua' };

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function prioBadgeClass(p) {
  return 'badge-' + p.toLowerCase();
}
function cardClass(p) {
  return p.toLowerCase();
}
function prioIcon(p) {
  const icons = { Kritis:'🔴', Tinggi:'🟠', Menengah:'🟡', Normal:'🟢', Info:'🔵' };
  return icons[p] || '⚪';
}
function hl(text, q) {
  if (!q) return escHtml(text);
  const esc = escHtml(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc.replace(re, '<mark style="background:#FFF176;border-radius:3px;padding:0 2px">$1</mark>');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function filterData(data, query, prio) {
  return data.filter(item => {
    const prioMatch = prio === 'semua' || item.prio.toLowerCase() === prio;
    if (!prioMatch) return false;
    if (!query) return true;
    const q = query.toLowerCase();
    return item.code.includes(q) ||
           item.desc.toLowerCase().includes(q) ||
           item.solusi.some(s => s.toLowerCase().includes(q)) ||
           item.komponen.some(k => k.toLowerCase().includes(q)) ||
           item.tipe.toLowerCase().includes(q) ||
           item.prio.toLowerCase().includes(q);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function buildStats(data, tabId) {
  const counts = {};
  data.forEach(d => { counts[d.prio] = (counts[d.prio]||0) + 1; });
  const el = document.getElementById('stats-' + tabId);
  const order = [['Kritis','#C00000'],['Tinggi','#C55A11'],['Menengah','#856404'],['Normal','#2E7D32'],['Info','#2E75B6']];
  el.innerHTML = `<div class="stat-pill"><span class="stat-dot" style="background:var(--navy)"></span>Total: <span class="stat-count">${data.length}</span></div>` +
    order.map(([p,c]) => counts[p] ? `<div class="stat-pill"><span class="stat-dot" style="background:${c}"></span>${p}: <span class="stat-count">${counts[p]}</span></div>` : '').join('');
}

function buildFilters(tabId) {
  const el = document.getElementById('filter-' + tabId);
  const filters = [
    ['semua','Semua','chip-all'],
    ['kritis','🔴 Kritis','chip-kritis'],
    ['tinggi','🟠 Tinggi','chip-tinggi'],
    ['menengah','🟡 Menengah','chip-menengah'],
    ['normal','🟢 Normal/Info','chip-normal'],
  ];
  el.innerHTML = `<span class="filter-label">Filter:</span>` +
    filters.map(([val, label, cls]) =>
      `<button class="chip ${cls} ${activeFilters[tabId]===val?'active':''}"
        onclick="setFilter('${tabId}','${val}')">${label}</button>`
    ).join('');
}

function buildCards(data, tabId, query) {
  const grid = document.getElementById('grid-' + tabId);
  const countEl = document.getElementById('count-' + tabId);

  if (data.length === 0) {
    countEl.textContent = '';
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="es-icon">🔍</div>
      <h3>Tidak ditemukan</h3>
      <p>Coba kata kunci atau filter yang berbeda</p>
    </div>`;
    return;
  }

  countEl.innerHTML = `Menampilkan <span>${data.length}</span> kode`;

  grid.innerHTML = data.map(item => {
    const shortSolusi = item.solusi[0].length > 80
      ? item.solusi[0].slice(0,80) + '…'
      : item.solusi[0];
    const kompoStr = item.komponen.slice(0,2).join(' · ') + (item.komponen.length > 2 ? ` +${item.komponen.length-2}` : '');
    return `
    <div class="card ${cardClass(item.prio)}" onclick="openModal('${tabId}','${item.code}')">
      <div class="card-header">
        <div class="card-code">M-${item.code}</div>
        <div class="card-meta">
          <div class="card-title">${hl(item.desc, query)}</div>
          <div class="card-badges">
            <span class="badge ${prioBadgeClass(item.prio)}">${prioIcon(item.prio)} ${item.prio}</span>
            <span class="badge badge-tipe">${item.tipe}</span>
          </div>
        </div>
      </div>
      ${item.komponen.length > 0 ? `
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="card-section">
          <div class="section-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Komponen
          </div>
          <div class="section-text">${hl(kompoStr, query)}</div>
        </div>
        <div class="card-section">
          <div class="section-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Tindakan Pertama
          </div>
          <div class="section-text">${hl(shortSolusi, query)}</div>
        </div>
      </div>` : ''}
      <div class="card-actions">
        <button class="btn-detail">Lihat Detail Lengkap →</button>
      </div>
    </div>`;
  }).join('');
}

function render(tabId) {
  const data = tabId === 'dispenser' ? DISPENSER_DATA : CARDREADER_DATA;
  const filtered = filterData(data, searchQuery, activeFilters[tabId]);
  buildStats(data, tabId);
  buildFilters(tabId);
  buildCards(filtered, tabId, searchQuery);
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function openModal(tabId, code) {
  const data = tabId === 'dispenser' ? DISPENSER_DATA : CARDREADER_DATA;
  const item = data.find(d => d.code === code);
  if (!item) return;

  document.getElementById('mCode').textContent = 'M-' + item.code;
  document.getElementById('mTitle').textContent = item.desc;
  document.getElementById('mBadges').innerHTML =
    `<span class="badge ${prioBadgeClass(item.prio)}">${prioIcon(item.prio)} ${item.prio}</span>
     <span class="badge badge-tipe">${item.tipe}</span>`;

  const prio = item.prio.toLowerCase();
  const prioLabel = { kritis:'⛔ Prioritas KRITIS – Tindakan Segera!', tinggi:'⚠️ Prioritas TINGGI – Segera Perbaiki', menengah:'📋 Prioritas MENENGAH – Perlu Perhatian', normal:'✅ Normal – Tidak Perlu Tindakan', info:'ℹ️ Informasi Status' };

  let html = `<div class="prio-banner ${prio}">${prioLabel[prio]||''}</div>`;

  html += `<div class="modal-section">
    <div class="modal-section-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Deskripsi Lengkap
    </div>
    <div class="modal-section-text">${escHtml(item.desc)}</div>
  </div>`;

  if (item.komponen.length > 0) {
    html += `<div class="modal-section">
      <div class="modal-section-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        Komponen / Bagian yang Bermasalah
      </div>
      <div>${item.komponen.map(k=>`<span class="komponen-tag">${escHtml(k)}</span>`).join('')}</div>
    </div>`;
  }

  html += `<div class="modal-section">
    <div class="modal-section-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Langkah Tindakan (${item.solusi.length} langkah)
    </div>
    <ul class="solusi-list">
      ${item.solusi.map((s,i)=>`<li><span class="solusi-num">${i+1}</span><span>${escHtml(s)}</span></li>`).join('')}
    </ul>
  </div>`;

  document.getElementById('mBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════
function setFilter(tabId, val) {
  activeFilters[tabId] = val;
  render(tabId);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('tab-' + activeTab).classList.add('active');
    render(activeTab);
  });
});

const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = searchInput.value.trim();
    render('dispenser');
    render('cardreader');
  }, 200);
});

document.getElementById('clearSearch').addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  render('dispenser');
  render('cardreader');
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault(); searchInput.focus();
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render('dispenser');
render('cardreader');
</script>
